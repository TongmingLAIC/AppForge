name: Feature request
description: Suggest an improvement for AppForge
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea. Please keep it specific and actionable.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
      placeholder: It is difficult to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution.
      placeholder: Add a new ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated.
  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Which files/modules are likely affected?
      placeholder: examples/test.py, AppForge/appforge.py, readme.md
